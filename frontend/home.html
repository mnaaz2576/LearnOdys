<!DOCTYPE html>
<html>

<head>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<title>LearnOdys</title>

<link rel="stylesheet" href="style.css">

</head>

<body class="home-page">

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">LearnOdys</div>

<div class="nav-links">

<a href="index.html" id="loginBtn">Login</a>

<a href="signup.html" id="signupBtn">Sign Up</a>

<!-- PROFILE -->
<div id="profileSection" style="display:none; align-items:center; gap:15px; position:relative;">
  
  <div id="profileLetter" onclick="toggleMenu()" class="avatar-mini" style="cursor:pointer; width:35px; height:35px; font-size:16px; display:flex; align-items:center; justify-content:center; background:#ff4d7d; color:white; border-radius:50%; font-weight:600;">
    U
  </div>

  <div id="menu" style="display:none; position:absolute; right:0; top:45px; background:white; padding:15px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.1); min-width:150px; z-index:100;">
    <p id="profileName" style="margin:0 0 10px 0; font-weight:600; font-size:14px; color:#1e293b;"></p>
    <hr style="border:0; border-top:1px solid #f1f5f9; margin-bottom:10px;">
    <a href="dash.html" style="text-decoration:none; color:#475569; display:block; margin-bottom:8px; font-size:14px;">Dashboard</a>
    <a href="list.html" style="text-decoration:none; color:#475569; display:block; margin-bottom:8px; font-size:14px;">My List</a>
    <button onclick="logout()" style="width:100%; padding:8px; background:#fef2f2; color:#ef4444; border:none; border-radius:6px; cursor:pointer; font-weight:600; font-size:13px; margin-top:5px;">Logout</button>
  </div>
</div>

</div>

</div>


<!-- HERO SECTION - ASYMMETRICAL -->

<section class="hero-asymmetric">

<div class="hero-content">

<div class="hero-text">
<h1>Find Your Perfect Learning Path</h1>
<p>AI-powered course discovery tailored to your goals. Ask anything about learning!</p>
</div>

<div class="ai-mentor-inline">
    <div class="ai-widget-header">
        <div class="ai-widget-header-left">
            <div class="ai-avatar-header">🤖</div>
            <div>
                <div class="ai-widget-title">AI Learning Mentor</div>
                <div class="ai-widget-subtitle">Ready to guide your study journey</div>
            </div>
        </div>
    </div>
    
    <div class="chat-container-inline">
        <div id="chatMessages" class="chat-messages advisor-output"></div>
        
        <div class="ai-quick-chips">
            <button class="ai-chip" onclick="sendQuickChip('Python for absolute beginners')">🐍 Python</button>
            <button class="ai-chip" onclick="sendQuickChip('Intro to Web Development')">🌐 Web Dev</button>
            <button class="ai-chip" onclick="sendQuickChip('Data Science basics')">📊 Data Science</button>
            <button class="ai-chip" onclick="sendQuickChip('Artificial Intelligence guide')">🤖 AI Basics</button>
        </div>

        <div class="advisor-controls">
            <div class="advisor-input-wrap">
                <input type="text" id="aiQuestion" placeholder="Ask your mentor anything..." 
                       onkeypress="handleChatEnter(event)" oninput="updateCharCount()" maxlength="500">
                <div id="charCounter" class="char-counter">0 / 500</div>
            </div>
            <button id="aiSendBtn" class="advisor-send-btn" onclick="askAI()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>
    </div>
<div class="get-started-wrap">
  <a href="courses.html" class="get-started-btn">Explore Courses &rarr;</a>
</div>
</div>

</div>

<div class="hero-image-section">
<img src="growth.png" class="hero-image" alt="Learning Journey">
</div>

</section>


<!-- FOOTER -->

<footer>
<p>© 2026 LearnOdys</p>
</footer>

<script src="home.js"></script>

</body>
</html>
