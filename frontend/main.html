<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learnodys - Curate Your Learning Journey</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Baloo 2', cursive;
    overflow-x: hidden;
    background: #0a192f;
}

/* Logo fixed at top-left */
.logo {
    position: fixed;
    top: 20px;
    left: 20px;
    font-size: 1.8rem;
    font-weight: 700;
    color: #0ea5e9;
    font-family: 'Baloo 2', cursive;
    z-index: 10;
}

.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    text-align: center;
    color: white;
    background-image: url('https://images.unsplash.com/photo-1581091226825-a6a2a5aee158?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80');
    background-size: cover;
    background-position: center;
}

.hero::before {
    content: '';
    position: absolute;
    top:0; left:0; right:0; bottom:0;
    background: rgba(10, 25, 47, 0.6);
    z-index:1;
}

/* Hero card with neutral, opaque background */
.hero-card {
    position: relative;
    z-index:2;
    width: 600px;
    max-width: 90%;
    padding: 3rem 2rem;
    border-radius: 20px;
    text-align: center;
    color: white;
    background: linear-gradient(135deg, #4b4b5c, #60607a); /* dull neutral gradient */
    box-shadow: 0 15px 50px rgba(0,0,0,0.5);
    opacity: 1; /* fully opaque */
}

/* Animate words individually */
.hero-card h1 {
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 700;
    margin-bottom: 1.5rem;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    overflow: hidden;
}

.hero-card h1 span {
    opacity: 0;
    display: inline-block;
    animation: fadeInWord 1s forwards;
}

.hero-card h1 span:nth-child(1) { animation-delay: 0.3s; }
.hero-card h1 span:nth-child(2) { animation-delay: 0.8s; }
.hero-card h1 span:nth-child(3) { animation-delay: 1.3s; }
.hero-card h1 span:nth-child(4) { animation-delay: 1.8s; }

@keyframes fadeInWord {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
}

/* Paragraph fade in */
.hero-card p {
    font-size: clamp(1.2rem, 2.5vw, 1.5rem);
    margin-bottom: 2rem;
    text-shadow: 1px 1px 6px rgba(0,0,0,0.4);
    opacity: 0;
    animation: fadeInText 1s forwards;
    animation-delay: 2.5s;
}

@keyframes fadeInText {
    0% { opacity: 0; transform: translateY(10px);}
    100% { opacity: 1; transform: translateY(0);}
}

/* Button fade in */
.hero-card a {
    display: inline-block;
    padding: 1rem 2.5rem;
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    font-weight: 600;
    background: rgba(255,255,255,0.15);
    border-radius: 50px;
    color: white;
    text-decoration: none;
    transition: all 0.3s ease;
    box-shadow: 0 10px 30px rgba(14,165,233,0.4);
    opacity: 0;
    animation: fadeInText 1s forwards;
    animation-delay: 3s;
}

.hero-card a:hover {
    transform: translateY(-5px) scale(1.05);
    box-shadow: 0 15px 40px rgba(14,165,233,0.6);
    background: rgba(255,255,255,0.25);
}

/* Floating bubbles */
.particles {
    position: absolute;
    top:0; left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:1;
}

.particle {
    position: absolute;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    animation: float 8s infinite linear;
}

.particle:nth-child(1) { width: 12px; height: 12px; top: 20%; left: 5%; animation-delay: 0s; }
.particle:nth-child(2) { width: 18px; height: 18px; top: 70%; right: 10%; animation-delay: 2s; }
.particle:nth-child(3) { width: 10px; height: 10px; bottom: 20%; left: 80%; animation-delay: 4s; }
.particle:nth-child(4) { width: 14px; height: 14px; top: 40%; right: 25%; animation-delay: 1.5s; }

@keyframes float {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
}

@media (max-width:768px){
    .hero-card { padding:2rem 1.5rem; }
    .hero-card h1 { font-size: clamp(1.8rem,5vw,2.5rem); }
}
</style>
</head>
<body>
<div class="logo">
    Learnodys
</div>

<section class="hero">
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="hero-card">
        <h1>
            <span>Curate</span> 
            <span>Your</span> 
            <span>Learning</span> 
            <span>Journey</span>
        </h1>
        <p>Discover personalized courses tailored just for you</p>
       <a href="home.html">Get Started</a>

    </div>
</section>
</body>
</html>
