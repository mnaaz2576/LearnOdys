<script>

// 👤 SHOW USER
const user = localStorage.getItem("userEmail")

if(user){
    document.getElementById("profileName").innerText = user
}

// 🔓 LOGOUT
function logout(){
    const email = localStorage.getItem("userEmail") || "guest";
    localStorage.removeItem(`advisorChat_${email.toLowerCase()}`);
    localStorage.removeItem("userEmail");
    window.location.href = "index.html";
}

// 🔍 NAV SEARCH FUNCTION
function navSearch(){
    const value = document.getElementById("navSearch").value
    if(value.trim() !== ""){
        window.location.href = "courses.html?search=" + value
    }
}

// ⌨️ ENTER KEY SUPPORT
document.getElementById("navSearch").addEventListener("keypress", function(e){
    if(e.key === "Enter"){
        navSearch()
    }
})

// 🔽 DROPDOWN TOGGLE
function toggleDropdown() {
  const menu = document.getElementById("dropdownMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// ❌ CLOSE ON OUTSIDE CLICK
window.onclick = function(e) {
  if (!e.target.closest(".profile-dropdown")) {
    document.getElementById("dropdownMenu").style.display = "none";
  }
}

const params = new URLSearchParams(window.location.search)
const search = params.get("search")

if(search){
    document.getElementById("navSearch").value = search
}



</script>
