<!DOCTYPE html>
<html>

<head>
<title>Course Results</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">

<div class="logo">LearnOdys</div>

<div class="nav-right">

<span id="profileName"></span>

<button onclick="logout()" class="btn-primary">Logout</button>

</div>

</div>

<div class="courses-container">

    <!-- LEFT FILTER -->
    <div class="filters">

        <h3>Filter by</h3>

        <h4>Level</h4>

        <label><input type="checkbox" class="level-filter" value="Beginner"> Beginner</label>
        <label><input type="checkbox" class="level-filter" value="Intermediate"> Intermediate</label>
        <label><input type="checkbox" class="level-filter" value="Advanced"> Advanced</label>

        <h4>Duration</h4>

        <label><input type="checkbox" class="duration-filter" value="< 30 mins"> &lt; 30 mins</label>
        <label><input type="checkbox" class="duration-filter" value="30 - 60 mins"> 30 - 60 mins</label>
        <label><input type="checkbox" class="duration-filter" value="1 - 2 hours"> 1 - 2 hours</label>
        <label><input type="checkbox" class="duration-filter" value="2 - 5 hours"> 2 - 5 hours</label>
        <label><input type="checkbox" class="duration-filter" value="5 - 10 hours"> 5 - 10 hours</label>
        <input type="checkbox" class="duration-filter" value="20+ hours"> 20+ hours<br>
        <input type="checkbox" class="duration-filter" value="month"> Months<br>
        <input type="checkbox" class="duration-filter" value="week"> Weeks<br>

        <h4>Platform</h4>

        <input type="checkbox" class="platform-filter" value="Coursera"> Coursera<br>
        <input type="checkbox" class="platform-filter" value="Udemy"> Udemy<br>
        <input type="checkbox" class="platform-filter" value="edX"> edX<br>
        <input type="checkbox" class="platform-filter" value="YouTube"> YouTube<br>
        <input type="checkbox" class="platform-filter" value="Udacity"> Udacity<br>
        <input type="checkbox" class="platform-filter" value="FutureLearn"> FutureLearn<br>
        <input type="checkbox" class="platform-filter" value="Simplilearn"> Simplilearn<br>

    </div>


    <!-- COURSE AREA -->
    <div class="courses-area">

        <h1>Course Results</h1>

        <div id="courseContainer"></div>

    </div>

</div>

<div id="courseContainer"></div>

<script src="courses.js"></script>

<script>

const user = localStorage.getItem("userEmail")

if(user){
document.getElementById("profileName").innerText = "👤 " + user
}

function logout(){

localStorage.removeItem("userEmail")

window.location.href = "index.html"

}

</script>
</body>
</html>
